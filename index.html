<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWell | Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidienne: '#1C1C1E',
                        sunlight: '#FFD700',
                        menthe: '#E0F2F1',
                        eucalyptus: '#A8DADC',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1C1C1E;
            overflow: hidden;
        }
        /* Lueur Sunlight façon studio photo */
        .sunlight-glow {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, rgba(28, 28, 30, 0) 70%);
            filter: blur(80px);
            z-index: 0;
        }
    </style>
</head>
<body class="text-menthe font-sans antialiased">

    <div class="sunlight-glow"></div>

    <div class="relative z-10 min-h-screen flex flex-col justify-between p-8 md:p-16">
        
        <header class="flex justify-between items-center">
            <span class="text-2xl font-black tracking-tighter uppercase italic">ZenWell</span>
            <button class="text-eucalyptus text-sm uppercase tracking-widest hover:text-sunlight transition-colors">Passer</button>
        </header>

        <main class="max-w-5xl">
            <div class="mb-6 flex items-center gap-4">
                <div class="h-[2px] w-24 bg-sunlight"></div>
                <span class="text-sunlight text-xs uppercase tracking-[0.3em] font-bold">Étape 01</span>
            </div>
            
            <h1 class="text-6xl md:text-8xl lg:text-[120px] font-black leading-[0.9] tracking-tighter uppercase mb-8">
                Le début de <br> 
                <span class="text-transparent" style="-webkit-text-stroke: 1px #E0F2F1;">votre</span> équilibre.
            </h1>

            <p class="text-eucalyptus text-xl md:text-2xl max-w-2xl leading-relaxed mb-12">
                Quelques questions pour adapter nos séances à votre rythme et à vos objectifs personnels.
            </p>

            <button class="group relative inline-flex items-center justify-center px-10 py-5 font-bold text-obsidienne transition-all duration-200 bg-sunlight rounded-full hover:scale-105 active:scale-95 uppercase tracking-widest text-sm">
                Commencer l'expérience
                <svg class="w-5 h-5 ml-3 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
            </button>
        </main>

        <footer class="flex items-center gap-8">
            <div class="flex-1 h-[1px] bg-white/10 relative">
                <div class="absolute top-0 left-0 h-full bg-sunlight w-1/4"></div>
            </div>
            <span class="text-[10px] uppercase tracking-[0.4em] text-eucalyptus">Scroll pour découvrir</span>
        </footer>

    </div>

</body>
</html>
