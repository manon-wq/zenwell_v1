<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWell | Bienvenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidienne: '#1C1C1E',
                        sunlight: '#FFD700',
                        menthe: '#E0F2F1',
                        eucalyptus: '#A8DADC',
                    },
                    fontFamily: {
                        sans: ['Geist', 'sans-serif'],
                    },
                    letterSpacing: {
                        premium: '0.06em', // Ajusté pour le look all-caps
                    },
                    backgroundImage: {
                        // Dégradé radial pour le fond moderne
                        'gradient-glow': 'radial-gradient(circle at center, rgba(255, 215, 0, 0.08) 0%, rgba(28, 28, 30, 1) 60%)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1C1C1E; }
        /* Animation fluide pour la barre de progression */
        @keyframes progressLoad {
            from { width: 0%; }
            to { width: 25%; }
        }
        .progress-bar-fill {
            animation: progressLoad 1.2s ease-out forwards;
        }
    </style>
</head>
<body class="font-sans antialiased text-menthe bg-gradient-glow min-h-screen">

    <div class="flex flex-col min-h-screen px-6 py-6 md:px-10 md:py-8 max-w-screen-2xl mx-auto">
        
        <header class="flex justify-between items-center w-full z-10">
            <div class="flex flex-col">
                <svg width="140" height="35" viewBox="0 0 280 70" xmlns="http://www.w3.org/2000/svg">
                    <g fill="#FFD700">
                        <path d="M43.7 51.5L2.8 13.8V8.6h48.3v7.3H11l33.2 30.6V51.5z"/> <path d="M84.3 33.4H63.2c1.2 5.1 5 8.1 11.2 8.1 4.5 0 8.3-1.6 10.6-4.5h8.3C90 44.5 82.8 52 74 52c-12.7 0-20.2-9.6-20.2-20s7.6-20 20.2-20c12.2 0 19.3 9.4 19.3 20H84.3zm-21.1-6.1h20.1c-1.3-4.8-5.3-7.3-10.1-7.3-5 0-8.9 2.5-10 7.3z"/> <path d="M102.3 20.1h8.2v4.8c2.8-3.6 7.2-5.7 12.3-5.7 8.5 0 14.8 5.7 14.8 15.6v16.3h-8.2V35.6c0-5.6-3-9-8.7-9-6.3 0-10.2 4.1-10.2 10.8v13.7h-8.2V20.1z"/> <path d="M185 20.1l-11.4 31.2h-7.7L156.6 24l-9.3 27.3h-7.7L128.2 20.1h8.3l8.6 27.2 9.5-27.2h6.8l9.3 27.2 8.9-27.2H185z"/> <path d="M217.3 33.4h-21.1c1.2 5.1 5 8.1 11.2 8.1 4.5 0 8.3-1.6 10.6-4.5h8.3C223 44.5 215.8 52 207 52c-12.7 0-20.2-9.6-20.2-20s7.6-20 20.2-20c12.2 0 19.3 9.4 19.3 20H217.3zm-21.1-6.1h20.1c-1.3-4.8-5.3-7.3-10.1-7.3-5 0-8.9 2.5-10 7.3z"/> <path d="M233.1 3.2h8.2v48h-8.2z"/> <path d="M250.2 3.2h8.2v48h-8.2z"/> </g>
                    <text x="25" y="66" font-family="Geist, sans-serif" font-weight="700" font-size="9" fill="#FFD700" letter-spacing="0.1em">
                        CLUB SPORTIF ET DIGITAL
                    </text>
                </svg>
            </div>
            <button class="text-eucalyptus text-sm font-medium rounded-full px-5 py-2 hover:bg-eucalyptus/5 active:scale-95 transition-all">
                Passer
            </button>
        </header>

        <main class="flex-1 flex items-center justify-center py-12 md:py-16">
            <div class="w-full max-w-xl bg-obsidienne/40 backdrop-blur-sm border border-eucalyptus/5 p-10 md:p-14 rounded-[32px] shadow-2xl shadow-obsidienne/50">
                
                <div class="mb-14 space-y-4">
                    <p class="text-[11px] uppercase tracking-[0.25em] text-eucalyptus font-bold">
                        Étape 1 sur 4
                    </p>
                    <div class="h-[3px] w-full bg-eucalyptus/10 rounded-full overflow-hidden">
                        <div class="h-full bg-sunlight progress-bar-fill rounded-full shadow-[0_0_10px_0_rgba(255,215,0,0.5)]"></div>
                    </div>
                </div>

                <section class="space-y-6 mb-16">
                    <h1 class="text-4xl md:text-5xl font-extrabold uppercase tracking-premium leading-[1.15] text-menthe">
                        Le début de<br />
                        <span class="text-sunlight">votre équilibre.</span>
                    </h1>
                    <p class="text-eucalyptus text-lg md:text-xl font-light leading-relaxed max-w-md opacity-90">
                        Quelques questions pour adapter nos séances à votre rythme et à vos objectifs personnels.
                    </p>
                </section>

                <div>
                    <button class="group w-full md:w-auto px-12 py-5 bg-sunlight text-obsidienne font-extrabold rounded-full 
                                   hover:bg-[#FFDF33] hover:shadow-[0_10px_30px_-10px_rgba(255,215,0,0.4)]
                                   active:scale-[0.97] transition-all duration-300
                                   text-lg flex items-center justify-center gap-3 shadow-lg shadow-sunlight/10">
                        Commencer l'expérience
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:translate-x-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </button>
                </div>

            </div>
        </main>

        <footer class="pt-8 flex flex-col md:flex-row justify-between items-center gap-4 z-10">
            <p class="text-[10px] text-eucalyptus/30 uppercase tracking-[0.2em] font-medium">
                © 2026 ZenWell Studio
            </p>
            <div class="flex gap-1.5">
                <span class="px-3 py-1 text-[10px] text-eucalyptus/50 uppercase tracking-[0.1em] font-semibold bg-eucalyptus/5 rounded-full border border-eucalyptus/10">Slow Sport</span>
                <span class="px-3 py-1 text-[10px] text-eucalyptus/50 uppercase tracking-[0.1em] font-semibold bg-eucalyptus/5 rounded-full border border-eucalyptus/10">Digital Wellness</span>
            </div>
        </footer>

    </div>

</body>
</html>
